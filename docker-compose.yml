services:
  easy-wol:
    image: ghcr.io/siyarbekir47/easy-wol:latest
    container_name: easy-wol
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "${PORT:-8080}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-change-this-password}"
      DB_PATH: "${DB_PATH:-/app/data/easy-wol.sqlite}"
      SSH_KEY_DIR: "${SSH_KEY_DIR:-/app/ssh}"
    volumes:
      - ./data:/app/data
      - ./ssh-keys:/app/ssh:ro
